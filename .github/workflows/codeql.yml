name: CodeQL

on:
  push:
    branches: [master]
    paths-ignore:
      - "wiki/**"
      - "raw/**"
      - "projects/**"
  pull_request:
    branches: [master]
    paths-ignore:
      - "wiki/**"
      - "raw/**"
      - "projects/**"
  schedule:
    - cron: "0 3 * * 1"  # weekly, Monday 03:00 UTC — full scan even without code changes

# Deny all permissions by default; each job opts in to only what it needs.
permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
