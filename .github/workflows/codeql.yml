name: CodeQL

on:
  push:
    branches: [master]
    paths-ignore:
      - "wiki/**"
      - "raw/**"
      - "projects/**"
  pull_request:
    branches: [master]
    paths-ignore:
      - "wiki/**"
      - "raw/**"
      - "projects/**"
  schedule:
    - cron: "0 3 * * 1"  # weekly, Monday 03:00 UTC — full scan even without code changes

# Deny all permissions by default; each job opts in to only what it needs.
permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        # The wiki tooling (python) plus the CI workflows themselves (actions —
        # script injection, unpinned actions, permission misconfig). Both use
        # build-mode: none, so the single build-mode below covers each job.
        language: [python, actions]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: ${{ matrix.language }}
          # The wiki tooling is stdlib-only — autobuild's job is to install
          # dependencies so CodeQL can resolve library calls, and there are none
          # to install here, so build-mode: none extracts the same source with
          # no wasted build step. Query suite + path tuning live in the config
          # file. (Re-add a build mode if a real dependency manifest ever lands.)
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
