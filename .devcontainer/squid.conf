# Brain devcontainer egress proxy (squid-openssl).
#
# Enforces a HOSTNAME allowlist on all outbound HTTPS/HTTP. Uses peek+splice:
# squid peeks the TLS ClientHello SNI, and for allowed names *splices*
# (tunnels without decrypting — end-to-end TLS is preserved, no MITM, no CA
# injection needed). Disallowed names are terminated.
#
# This is stronger than an IP allowlist: it can't be bypassed by an exfil
# endpoint co-hosted on an allowed CDN IP, and it defeats the
# CONNECT-host != real-SNI domain-fronting trick.
#
# iptables (see init-firewall.sh) locks egress to this proxy's UID only, so
# nothing in the container can reach the network except through here — the one
# exception is host.docker.internal:11434 (the host ollama daemon), which the
# firewall allows directly and which NO_PROXY keeps off this proxy.

http_port 3128 ssl-bump tls-cert=/etc/squid/certs/bump.pem tls-key=/etc/squid/certs/bump.pem
sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/lib/squid/ssl_db -M 4MB

# IPv6 egress is default-denied by ip6tables, so don't waste round-trips trying
# AAAA first on dual-stack hostnames — prefer IPv4.
dns_v4_first on

# --- Allowlist: single source of truth in /etc/squid/allowlist.txt ---
# Both the SNI check (ssl::server_name) and the CONNECT-target check
# (dstdomain) read the SAME file, so a host can't be half-added to one list.
# One host per line; leading dot = domain + subdomains. Edit allowlist.txt
# and rebuild to change it.
acl allowed_sni ssl::server_name "/etc/squid/allowlist.txt"
acl allowed_dom dstdomain        "/etc/squid/allowlist.txt"

acl step1 at_step SslBump1
acl SSL_ports port 443
acl Safe_ports port 80 443
acl CONNECT method CONNECT

# Peek at the ClientHello (SNI) at step 1, then splice allowed names, kill rest.
# Threat-model note: peek+splice trusts the cleartext ClientHello SNI. TLS
# Encrypted Client Hello (ECH) would hide the real SNI; squid then sees no
# allowed name and `terminate all` denies it (fail-closed). The CONNECT-host
# allowlist (allowed_dom) still constrains the actual destination either way.
ssl_bump peek step1
ssl_bump splice allowed_sni
ssl_bump terminate all

# Belt-and-suspenders: explicitly deny the cloud link-local metadata IP
# (already covered by default-deny + hostname allowlist, but self-documenting).
acl metadata dst 169.254.169.254/32
http_access deny metadata

# Outer access gate (CONNECT target / HTTP Host).
http_access deny !Safe_ports
http_access allow CONNECT allowed_dom SSL_ports
http_access deny CONNECT all
http_access allow allowed_dom
http_access deny all

# No caching; quiet, container-appropriate logging to stdio.
cache deny all
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log
# Keep one rotated generation; the entrypoint supervisor triggers `squid -k
# rotate` when access.log grows past a size cap, bounding the audit log.
logfile_rotate 1
# No pid file: the root entrypoint manages squid as a background process, and
# /run is root-owned while squid drops to the proxy user.
pid_filename none
shutdown_lifetime 1 second

# Run as the unprivileged proxy user (iptables owner-match keys off this UID).
cache_effective_user proxy
cache_effective_group proxy
