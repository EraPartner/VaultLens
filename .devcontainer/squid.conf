# CANONICAL egress proxy (squid-openssl) — shared, identical across all
# devcontainers. DO NOT edit per-project copies: edit THIS file and run ./sync.sh.
#
# Enforces a HOSTNAME allowlist on all outbound HTTPS/HTTP via peek+splice:
# squid peeks the TLS ClientHello SNI and, for allowed names, *splices* (tunnels
# without decrypting — end-to-end TLS preserved, no MITM, no CA injection).
# Disallowed names are terminated. iptables (init-firewall.sh) locks egress to
# this proxy's UID, so nothing reaches the network except through here. The
# allowlist itself is per-project: /etc/squid/allowlist.txt.

http_port 3128 ssl-bump tls-cert=/etc/squid/certs/bump.pem tls-key=/etc/squid/certs/bump.pem
sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/lib/squid/ssl_db -M 4MB

# IPv6 egress is default-denied; prefer IPv4 to avoid wasted AAAA round-trips.
dns_v4_first on

# Both the SNI check and the CONNECT-target check read the SAME per-project file.
acl allowed_sni ssl::server_name "/etc/squid/allowlist.txt"
acl allowed_dom dstdomain        "/etc/squid/allowlist.txt"

acl step1 at_step SslBump1
acl SSL_ports port 443
acl Safe_ports port 80 443
acl CONNECT method CONNECT

# Peek at the ClientHello (SNI) at step 1, splice allowed names, kill the rest.
# ECH would hide the SNI -> no allowed name -> `terminate all` denies (fail-closed).
ssl_bump peek step1
ssl_bump splice allowed_sni
ssl_bump terminate all

# Outer access gate. Explicitly deny the cloud metadata IP (belt-and-suspenders).
acl metadata dst 169.254.169.254/32
http_access deny metadata
http_access deny !Safe_ports
http_access allow CONNECT allowed_dom SSL_ports
http_access deny CONNECT all
http_access allow allowed_dom
http_access deny all

cache deny all
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log
logfile_rotate 1
pid_filename none
shutdown_lifetime 1 second

cache_effective_user proxy
cache_effective_group proxy
