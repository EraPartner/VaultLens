# Scoped (read-only workspace) override — the Compose equivalent of
# scoped/devcontainer.json's workspaceMount=readonly. bin/agent-compose layers
# this on top of compose.yaml for every profile EXCEPT master. Compose merges
# service `volumes` by target path, so re-declaring the /workspaces/Brain mount
# here replaces the base (read-write) one with a read-only bind; all other mounts
# (.git, .devcontainer, home volumes, stage, qmd seed, symlink targets) are kept.
# The single read-WRITE "hole" (author=wiki/, raw=raw/, projects=projects/,
# project:<X>=projects/<X>/) is added by a generated compose.hole.yaml.
services:
  app:
    volumes:
      - type: bind
        source: ..
        target: /workspaces/Brain
        read_only: true
