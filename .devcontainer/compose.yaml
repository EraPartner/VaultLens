# Docker Compose flow for the Brain (VaultLens) sandbox — devcontainer-free
# equivalent of .devcontainer/devcontainer.json (+ scoped/devcontainer.json).
# Driven by .devcontainer/bin/agent-compose, which sets the env vars below per
# capability profile and selects the right compose files / project name.
#
# Profile model (mirrors bin/agent):
#   - BRAIN_WS_RO=false (master)  -> workspace read-WRITE.
#   - BRAIN_WS_RO=true  (scoped)  -> workspace read-ONLY; the launcher adds a
#     single RW "hole" via a generated override (compose.hole.yaml) for
#     author/raw/projects/project:<X>. reader gets no hole.
#   - BRAIN_VOL_KEY keys the home volumes per (root, profile) so every profile —
#     including each projects/<X> — gets its own isolated set (the volume name then
#     always matches its owning compose project, so no cross-project re-own churn).
#   - per-profile isolation = a distinct compose project name (`-p brain-<profile>`).
#
# PID1 entrypoint runs as root (iptables + squid + ollama hole); sessions use
# `exec -u dev` (= containerUser=root + remoteUser=dev). Commits happen on the
# HOST: .git is read-only and no git push token is ever forwarded.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    cap_drop: [ALL]
    cap_add: [NET_ADMIN, CHOWN, DAC_OVERRIDE, FOWNER, SETUID, SETGID]
    security_opt:
      - no-new-privileges:true
    mem_limit: 6g
    memswap_limit: 6g          # == mem_limit: no swap headroom beyond the cap
    cpus: 4
    pids_limit: 4096
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=512m
      - /var/tmp:rw,noexec,nosuid,nodev,size=256m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DEVCONTAINER: "true"
      DISABLE_TELEMETRY: "1"
      DISABLE_ERROR_REPORTING: "1"
      BASH_ENV: /home/dev/.safe-chain/scripts/init-posix.sh
      NODE_USE_ENV_PROXY: "1"
      HTTP_PROXY: http://127.0.0.1:3128
      HTTPS_PROXY: http://127.0.0.1:3128
      http_proxy: http://127.0.0.1:3128
      https_proxy: http://127.0.0.1:3128
      NO_PROXY: localhost,127.0.0.1,::1,host.docker.internal
      no_proxy: localhost,127.0.0.1,::1,host.docker.internal
      OLLAMA_HOST: http://host.docker.internal:11434
      QMD_EMBED_MODEL: hf:Qwen/Qwen3-Embedding-0.6B-GGUF/Qwen3-Embedding-0.6B-Q8_0.gguf
    volumes:
      # Workspace: read-WRITE here (master). Scoped profiles overlay
      # compose.scoped.yaml, which re-declares this mount read-only.
      - type: bind
        source: ..
        target: /workspaces/Brain
        read_only: false
      # SECURITY: .git + .devcontainer always read-only (history + anti-tamper).
      - type: bind
        source: ../.git
        target: /workspaces/Brain/.git
        read_only: true
      - type: bind
        source: .
        target: /workspaces/Brain/.devcontainer
        read_only: true
      # Home volumes, keyed by BRAIN_VOL_KEY (isolated per root+profile, incl. each project).
      - type: volume
        source: claude
        target: /home/dev/.claude
      - type: volume
        source: copilot
        target: /home/dev/.copilot
      - type: volume
        source: local
        target: /home/dev/.local
      - type: volume
        source: config
        target: /home/dev/.config
      - type: volume
        source: cache
        target: /home/dev/.cache
      # Sanitized host config staging (built by the launcher), read-only.
      - type: bind
        source: ${HOME}/.claude-sandbox/stage/brain
        target: /home/dev/.claude-stage
        read_only: true
      # Safety guard: the canonical PreToolUse Bash hook, shared with the host
      # and the other sandboxes. Both read-only so the in-container agent (incl.
      # headless wiki agents) can neither rewrite the script nor disable the
      # policy that registers it. managed-settings outranks user/project scope
      # and lives outside the writable ~/.claude volume the config sync touches;
      # this base mount is inherited by every scoped profile too (compose merges
      # volumes by target, and compose.scoped.yaml only re-declares the workspace
      # mount). PreToolUse hooks still fire under --dangerously-skip-permissions.
      - type: bind
        source: ${HOME}/.claude/hooks/guard.mjs
        target: /usr/local/share/claude-guard/guard.mjs
        read_only: true
      - type: bind
        source: ${HOME}/.claude/hooks/managed-settings.json
        target: /etc/claude-code/managed-settings.json
        read_only: true
      # Project memory: the host copy is bind-mounted READ-ONLY as a SEED. post-start
      # snapshots it into the writable ~/.claude volume at the real per-project memory
      # path, so in-container Claude READS current host memory and WRITES new memories
      # to its own volume — NOT a live bind. The launcher (bin/agent) pushes the
      # container's memory back to the host ONLY for interactive operator sessions
      # (brain-claude / brain-shell); headless wiki-agent runs never write host memory,
      # so a hostile source doc cannot plant persistent prompt-injection into the HOST
      # instruction context that every host Claude session auto-loads. Bidirectional,
      # but the write-back is gated to operator-driven sessions. ONLY memory/ is shared
      # (never sessions/tool-results). If the vault path moves, update SOURCE (it is the
      # encoded host cwd; bin/agent derives the same encoding for the push-back target).
      - type: bind
        source: ${HOME}/.claude/projects/-Users-computer-Library-Mobile-Documents-iCloud-md-obsidian-Documents-Brain/memory
        target: /home/dev/.claude-memory-seed
        read_only: true
      # qmd seed: host cache (models + index) read-only; post-start snapshots it.
      - type: bind
        source: ${HOME}/.cache/qmd
        target: /home/dev/.qmd-seed
        read_only: true
      # Symlink targets outside the vault, bind-mounted RO at identical host paths
      # so the in-vault project symlinks resolve with no rewriting.
      - type: bind
        source: ${HOME}/Documents/School
        target: ${HOME}/Documents/School
        read_only: true
      # Relocated 2026-05-24: Vision/Watchman moved to ~/Code; the in-vault
      # projects/{vision,watchman}/ symlinks now point at ~/Code/{Vision,Watchman},
      # so mount THOSE at identical host paths or the symlinks dead-link in-container.
      - type: bind
        source: ${HOME}/Code/Vision
        target: ${HOME}/Code/Vision
        read_only: true
      - type: bind
        source: ${HOME}/Code/Watchman
        target: ${HOME}/Code/Watchman
        read_only: true
      - type: bind
        source: ${HOME}/Documents/Personal/Scans/Finance/The Mad King
        target: ${HOME}/Documents/Personal/Scans/Finance/The Mad King
        read_only: true

volumes:
  claude:
    name: brain-claude-cmp-${BRAIN_VOL_KEY}
  copilot:
    name: brain-copilot-cmp-${BRAIN_VOL_KEY}
  local:
    name: brain-local-cmp-${BRAIN_VOL_KEY}
  config:
    name: brain-config-cmp-${BRAIN_VOL_KEY}
  cache:
    name: brain-cache-cmp-${BRAIN_VOL_KEY}
